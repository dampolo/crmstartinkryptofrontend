<h1 class="title">Rechnungen</h1>

<section>
    <table class="">
        <thead class="">
            <tr>
                <td class="">Rechnungsnr.</td>
                <td class="">Datum</td>
                <td class="">Service</td>
                <td class="">Status</td>
                <td class="">PDF</td>
            </tr>
        </thead>
        <tbody class="">
             @for (invoice of invoices(); track invoice.id) {
            <tr class="table">
                <td>{{ invoice.invoice_number }}</td>
                <td>{{ invoice.created_at | date: 'dd.MM.yyyy' }}</td>
                <td>{{ invoice.service_name }}</td>
                <td>{{ invoice.invoice_status }}</td>
                <td>
                    @if (invoice.invoice_category === "course") {
                        <a class="invoice" [href]="baseUrl + 'invoices/' + invoice.id + '/pdf_course/?download=true'">PDF</a>
                    }
                    @else {
                        <a class="invoice" [href]="baseUrl + 'invoices/' + invoice.id + '/pdf/?download=true'">PDF</a>

                    }
                </td>
            </tr>
            }

        </tbody>
    </table>
</section>
