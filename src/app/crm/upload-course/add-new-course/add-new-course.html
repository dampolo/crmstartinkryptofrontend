<a class="arrow-back" routerLink="/crm/kurse">
  <app-back></app-back>
</a>
<h1>Neue Kurs</h1>
<p>
    Alle Felder müssen ausgefüllt sein.
</p>
<form [formGroup]="courseForm" (ngSubmit)="sumbitMainData()">
  <section class="section-title">
    <div class="card">
      <div class="card-header">Name - Badge - Reihenfolge</div>
      <div class="card-body">
        <!-- Badge -->
        <div class="form-group">
          <label for="badge">Badge</label>
          <input
            id="badge"
            formControlName="badge"
            placeholder="pro"
            type="text"
          />
         
        </div>

        <!-- Order -->
        <div class="form-group">
          <label for="badge">Reihenfolge</label>
          <input
            id="order"
            formControlName="order"
            placeholder="e.g. 2"
            type="number"
            step="0.01"
            min="0"
          />
        </div>

        <!-- Name -->
        <div class="form-group">
          <label for="name">Name</label>
          <input
            id="name"
            formControlName="name"
            placeholder="name"
            type="text"
          />
        </div>
      </div>
    </div>
  </section>

  <!-- Status -->

  <section class="general-information">
    <div class="card">
      <div class="card-header">Status</div>

      <div class="card-body">
        <div class="form-group">
          <select id="status" formControlName="status">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
          
        </div>
      </div>
    </div>
  </section>

  <!-- Short describtion -->

  <section class="general-information">
    <div class="card">
      <label for="short-description" class="card-header">Kurze Beschreibung</label>

      <div class="card-body">
        <div class="form-group">
          <input
            type="text"
            id="short-description"
            formControlName="description"
            placeholder="...."
          />
        </div>
      </div>
    </div>
  </section>

  <!-- Price -->

  <section class="general-information">
    <div class="card">
      <div class="card-header">Price</div>

      <div class="card-body">
        <div class="form-group">
          <input
            type="number"
            formControlName="price"
            id="price"
            placeholder="e.g. 19.99"
            step="0.01"
            min="0"
          />
        </div>
      </div>
    </div>
  </section>

  <!-- Picture -->

  <section class="image-content">
    <div class="image-card">
      <div class="image-card-header">
        <div>Bild</div>
        <span>Max Size: 2MB (jpg, jpeg, png)</span>
      </div>

      <div class="upload-area">
        <div class="dropzone">
          <div class="upload-icon">
            <img src="./assets/upload-photo.svg" alt="upload" />
          </div>

          <div class="upload-title">Bild hochladen</div>
          <div class="upload-subtitle">Bild für den Upload per Drag-and-drop hinzufügen</div>

          <label class="main-btn-start-in-krypto">
            Bild wählen
            <input type="file" accept=".jpg, .jpeg, .png" />
          </label>
        </div>
      </div>
    </div>
  </section>

  <button type="submit" class="main-btn-start-in-krypto" [disabled]="!courseForm.valid">
    Hinzufügen
  </button>
</form>
