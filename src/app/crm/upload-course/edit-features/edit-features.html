<a class="arrow-back" routerLink="/crm/kurse">
  <app-back></app-back>
</a>

<h1 class="section-title">Themen editieren</h1>

<section class="general-information">
  <div class="card">
    <div for="lesson-title" class="card-header">Themen</div>

    <ul class="card-body">
      @for (feature of features; track feature.id) {
        <!-- Order -->

        <li class="form-group">
          <div class="order">
            <span class="section-number"> {{ feature.order | number: '1.0-0' }}</span>
          </div>

          <!-- Name -->
          <div class="text">
            <span>
              {{ feature.text }}
            </span>
          </div>

          <div class="buttons">
            <button
              type="button"
              (click)="editFeature(feature)"
              [ngClass]="showEdit ? '' : 'show-edit'"
              class="edit-button"
            >
              <!-- Pencil Icon -->
              <img src="./assets/edit.svg" alt="edit" />
              Ändern
            </button>

            <button
              type="button"
              (click)="deleteFeature(feature.id)"
              [ngClass]="showEdit ? '' : 'show-edit'"
              class="edit-button"
            >
              <img src="./assets/trash.svg" alt="wegschmeißen" />
            </button>

            <button type="submit" [ngClass]="showEdit ? 'show-edit' : ''" class="save-button">
              <!-- Pencil Icon -->
              <img src="./assets/check.svg" alt="ok" />
              ok
            </button>
          </div>
        </li>
      }
    </ul>

    <form [formGroup]="featuresForm" (ngSubmit)="submitFeature()">
      <!-- Add feature -->
      <div class="add-feature">
        <label for="order">Reihenfolge</label>
        <input
          id="order"
          formControlName="order"
          placeholder="e.g. 2"
          [ngClass]="showEdit ? '' : 'show-edit'"
          type="number"
          step="0.01"
          min="0"
        />
      </div>

      <div class="add-feature">
        <label for="text">Name</label>
        <input
          id="text"
          formControlName="text"
          placeholder="text"
          [ngClass]="showEdit ? '' : 'show-edit'"
          type="text"
        />
      </div>

      <button type="submit" class="main-btn-start-in-krypto" [disabled]="!featuresForm.valid">
        Hinzufügen
      </button>
    </form>
  </div>
</section>

<section
  class="hide-container"
  (click)="closeDialog()"
  [ngClass]="mainStateService.isEditFeatureVisible ? 'show-container' : ''"
>
  <form [formGroup]="editSingleFeature" (click)="$event.stopPropagation()" (ngSubmit)="submitEditSingleFeature()">
    <!-- Add feature -->
    <div class="add-feature">
      <label for="order">Reihenfolge</label>
      <input
        id="order"
        formControlName="order"
        placeholder="e.g. 2"
        [ngClass]="showEdit ? '' : 'show-edit'"
        type="number"
        step="0.01"
        min="0"
      />
    </div>

    <div class="add-feature">
      <label for="text">Name</label>
      <input
        id="text"
        formControlName="text"
        placeholder="text"
        [ngClass]="showEdit ? '' : 'show-edit'"
        type="text"
      />
    </div>

    <button type="button" type="button" (click)="closeDialog()" class="main-btn-start-in-krypto">Abbrechen</button>

    <button type="submit" class="main-btn-start-in-krypto" [disabled]="!editSingleFeature.valid">
      Hinzufügen
    </button>
  </form>
</section>
